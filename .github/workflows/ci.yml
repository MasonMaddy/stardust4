name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Hex lint — no hardcoded colours in shared component CSS
        run: node scripts/lint-hex.mjs

      - name: Link check — internal links and assets resolve
        run: node scripts/check-links.mjs

      - name: Architecture — pages link shared component CSS, no inline ds-* rules
        run: node scripts/check-architecture.mjs

      - name: Token exports — stardust.tokens.json in sync with tokens.css
        run: node scripts/build-tokens-json.mjs --check

      - name: Component API — api/*.json + llms.txt in sync with components
        run: node scripts/build-component-api.mjs --check

      - name: Changelog — about/changelog.json in sync with component manifests
        run: node scripts/build-changelog.mjs --check

      - name: Nav script syntax
        run: node --check docs/assets/js/nav.js

      - name: HTML validation
        run: npx --yes html-validate@8 "docs/**/*.html"
