<!--
  Stardust content-page scaffold (ds-page-author).
  Copy to docs/<section>/<slug>.html and fill the {{PLACEHOLDERS}}.
  Section = About | Foundations | Playbook | Resources (used as the eyebrow).
  Paths assume one folder deep (../assets/...). Reuse chrome classes; --sd-* tokens only.
  Drop the <style> block if the page needs no custom styles.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Stardust Design System</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <style>
    /* PAGE CHROME — {{slug}}.html only. No ds-* rules; --sd-* tokens only. */
    .pg-muted { color: var(--sd-colour-text-secondary); font-size: var(--sd-font-size-sm); }
  </style>
</head>
<body>

  <div id="site-nav"></div>
  <div class="site-content">
    <div class="page-layout">

      <main class="main-content">

        <div class="page-header scroll-spy-target" id="overview">
          <p class="page-header__eyebrow">{{SECTION}}</p>
          <h1 class="page-header__title">{{TITLE}}</h1>
          <!-- Optional: status badge for drafts
          <div class="page-header__meta">
            <span class="status-badge status-badge--wip">Draft — content in progress</span>
          </div>
          -->
          <p>{{ONE-LINE INTRO}}</p>
        </div>

        <!-- Repeat per section; keep each id unique and mirrored in the TOC below. -->
        <section class="section scroll-spy-target" id="{{SECTION_ID}}">
          <h2>{{SECTION HEADING}}</h2>
          <p>{{BODY}}</p>

          <!-- Available chrome you can reuse:
          <table class="ds-table" aria-label="{{label}}">
            <thead><tr><th>…</th></tr></thead>
            <tbody><tr><td>…</td></tr></tbody>
          </table>

          <div class="code-block"><pre>{{code — auto-gets a Copy button}}</pre></div>

          <div class="callout callout--info">
            <span class="callout__icon" aria-hidden="true">ℹ️</span>
            <div class="callout__body">
              <strong>{{title}}</strong>
              {{note}}
            </div>
          </div>
          -->
        </section>

      </main>

      <aside class="page-toc" aria-label="On this page">
        <p class="page-toc__title">On this page</p>
        <ul class="page-toc__nav">
          <li><a href="#overview">Overview</a></li>
          <li><a href="#{{SECTION_ID}}">{{SECTION HEADING}}</a></li>
        </ul>
      </aside>

    </div><!-- /.page-layout -->
  </div><!-- /.site-content -->

  <script src="../assets/js/nav.js"></script>
  <!--
    Optional live data (mirror docs/api.html): fetch a same-origin JSON and build rows
    with createElement / createTextNode only — never innerHTML.
  -->
</body>
</html>
