<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Playground Sign-in — Service to Educator</title>

<!-- Stardust tokens (the real source of truth) + Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

<!-- Real site shell (sidebar nav + layout) so the prototype lives inside Stardust and you can jump in/out -->
<link rel="stylesheet" href="../../../assets/css/main.css" />

<!-- Real Stardust components for the harness chrome (rails, pills, reference card, buttons) -->
<link rel="stylesheet" href="../../../assets/css/components/title-block.css" />
<link rel="stylesheet" href="../../../assets/css/components/card.css" />
<link rel="stylesheet" href="../../../assets/css/components/radio-button.css" />
<link rel="stylesheet" href="../../../assets/css/components/selection-pill.css" />
<link rel="stylesheet" href="../../../assets/css/components/pill.css" />
<link rel="stylesheet" href="../../../assets/css/components/button.css" />

<style>
  html, body { margin: 0; min-height: 100%; font-family: var(--sd-font-family); }
  /* light Stardust surface — the design-system docs use surface-default/surface-grey */
  body { background: var(--sd-colour-surface-grey); color: var(--sd-colour-text-primary); overflow-x: hidden; }
  /* the prototype now lives inside the real site shell: nav.js injects the sidebar into #site-nav,
     main.css offsets .site-content by the sidebar width, and .proto-stage centres the harness in the rest. */
  .proto-stage {
    min-height: 100vh; box-sizing: border-box; padding: 56px 24px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .page-head { text-align: center; margin: 0 auto 30px; padding: 0 24px; max-width: 740px; }
  .page-head h1 { font-size: 20px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; color: var(--sd-colour-text-primary); }
  .page-head p { font-size: 13px; line-height: 1.5; margin: 0; color: var(--sd-colour-text-secondary); }

  #scaler { margin: auto; transform-origin: top center; }
  .harness { display: flex; flex-direction: column; align-items: center; gap: 40px; }
  .stage-row { display: flex; align-items: center; gap: 26px; }

  /* bare capture mode (?bare=1) — only the device, full size, for clean PNG export.
     Drop the site shell entirely so captures stay identical to before. */
  body.is-bare { background: transparent; }
  body.is-bare #site-nav { display: none; }
  body.is-bare .site-content { margin-left: 0 !important; }
  body.is-bare .proto-stage { padding: 0; min-height: 0; }
  body.is-bare .page-head,
  body.is-bare .rail,
  body.is-bare .controls { display: none; }
  body.is-bare .harness,
  body.is-bare .stage-row { gap: 0; }

  /* device frame (full size, as the prototype baseline) */
  .device {
    width: 390px; height: 800px; border-radius: 46px; padding: 0; flex-shrink: 0;
    background: #000; box-shadow: 0 30px 70px rgba(37,37,37,0.22), 0 0 0 11px #0a0a0a, 0 0 0 12px #2a2a2a;
    overflow: hidden; position: relative;
  }
  .device-screen { position: absolute; inset: 6px; border-radius: 40px; overflow: hidden; background: #fff; }
  .screen-fill { height: 100%; }

  /* Native scrollbars are hidden completely so scrollable content runs edge-to-edge inside the
     device — no reserved gutter, no side rails, nothing off-centre. A custom overlay thumb
     (.vc-scrollbar, injected + positioned by the harness JS) floats over the content's right edge
     and fades in only while scrolling. This is a true overlay: Chrome no longer honours
     `overflow: overlay`, and styled ::-webkit scrollbars always reserve layout space. */
  .device-screen *, .device-screen { scrollbar-width: none; }
  .device-screen ::-webkit-scrollbar { width: 0; height: 0; }
  .vc-scrollbar {
    position: absolute; right: 3px; width: 5px; border-radius: 999px;
    background: rgba(130, 130, 130, 0.45); opacity: 0; pointer-events: none;
    transition: opacity .35s ease; z-index: 60;
  }
  .vc-scrollbar.is-visible { opacity: 1; }
  @media (prefers-reduced-motion: reduce) { .vc-scrollbar { transition: none; } }

  /* iPad device frame — 11" (834 × 1194 pt); .is-landscape swaps the dimensions */
  .device.is-ipad { width: 834px; height: 1194px; border-radius: 44px; box-shadow: 0 30px 80px rgba(37,37,37,0.22), 0 0 0 12px #0a0a0a, 0 0 0 13px #2a2a2a; }
  .device.is-ipad.is-landscape { width: 1194px; height: 834px; }
  .device.is-ipad .device-screen { inset: 14px; border-radius: 30px; }

  /* device toggle — Phone ↔ iPad, sits above the stage */
  .device-toggle { display: flex; gap: 8px; justify-content: center; }

  /* side rails */
  .rail { width: 230px; flex-shrink: 0; }
  .rail-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sd-colour-text-secondary); margin: 0 0 12px 2px; }

  /* left rail — direction switcher (Stardust selectable cards: .ds-card--selectable + .ds-radio) */
  .rail-left { display: flex; flex-direction: column; gap: 10px; }
  .rail-left .ds-card { width: 100%; }
  /* orientation toggle sub-section, below the directions (iPad only) */
  .rail-sub { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--sd-colour-grey-300); }
  .rail-sub .rail-title { margin-bottom: 2px; }
  .rail-toggle { display: flex; gap: 8px; flex-wrap: wrap; }

  /* right rail — demo-credentials reference, styled as a Stardust surface card */
  .creds {
    background: var(--sd-colour-surface-default); border: 1px solid var(--sd-colour-border-default);
    border-radius: var(--sd-radius-lg); padding: 18px 18px 16px;
  }
  .creds-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sd-colour-text-secondary); margin-bottom: 14px; }
  .cred-row { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; padding: 10px 0; border-top: 1px solid var(--sd-colour-grey-200); }
  .cred-row:first-of-type { border-top: none; padding-top: 0; }
  .cred-label { font-size: 12px; font-weight: 600; color: var(--sd-colour-text-secondary); }
  .creds-note { font-size: 12px; line-height: 1.5; color: var(--sd-colour-text-secondary); margin: 14px 0 0; }
  .creds-note b { color: var(--sd-colour-text-primary); }

  /* bottom controls — flow-step nav (Stardust selection pills) + restart (ghost button) */
  .controls { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  /* section label above the scenario cards — matches the rail titles (Device / Reference) */
  .controls-title { margin: 0; text-align: center; }
  .flow-pills { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  /* scenario launchers (Stardust clickable cards) */
  .scenario-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .scenario-card { flex: 0 1 auto; min-width: 158px; padding: 13px 18px; }
  /* harmonise the card title with the Device toggle labels (14px) — the component default is 20px */
  .scenario-card .ds-title-block__title { white-space: nowrap; font-size: 14px; }
  /* trailing utility glyph — mirrors .ds-card__chevron sizing/colour for list & lock */
  .scenario-card__glyph { display: flex; width: 16px; height: 16px; color: var(--sd-colour-text-secondary); }
  .scenario-card__glyph svg { width: 16px; height: 16px; display: block; }

  /* entrance — transform only, so a frozen preview frame still shows everything */
  @keyframes v-rise-in { from { transform: translateY(14px); } to { transform: translateY(0); } }
  .v-rise { animation: v-rise-in .4s cubic-bezier(.22,.61,.36,1) both; }

  .v-btn { transition: filter .15s, transform .1s; }
  .v-btn:hover { filter: brightness(1.06); }
  .v-btn:active { transform: scale(0.985); }
  .v-input:focus { outline: none; border-color: var(--sd-colour-action-primary) !important; box-shadow: 0 0 0 3px rgba(0,119,107,0.14); }
  /* immersive (variant 6) translucent fields on teal */
  .v-input--dark::placeholder { color: rgba(255,255,255,0.6); }
  .v-input--dark:focus { border-color: #fff !important; box-shadow: 0 0 0 3px rgba(255,255,255,0.18); }

  /* flow interactions — rows, keypad, PIN shake, roster skeleton shimmer */
  .v-row { transition: transform .12s, box-shadow .18s; }
  .v-row:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
  .v-row:active { transform: scale(0.985); }
  .v-key { transition: transform .08s, background .12s; }
  .v-key:active { transform: scale(0.93); background: var(--sd-colour-grey-300) !important; }
  @keyframes v-shake-x { 10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(4px);} 30%,50%,70%{transform:translateX(-7px);} 40%,60%{transform:translateX(7px);} }
  .v-shake { animation: v-shake-x .45s; }
  @keyframes v-shimmer { 0% { background-position: -260px 0; } 100% { background-position: 260px 0; } }
  .v-skeleton {
    background: linear-gradient(90deg, var(--sd-colour-grey-200) 25%, var(--sd-colour-grey-100) 37%, var(--sd-colour-grey-200) 63%);
    background-size: 520px 100%; animation: v-shimmer 1.4s ease infinite;
  }

  /* variant 3 — animated bottom sheet: the hero height transitions, so the persistent white
     sheet slides up/down between steps; its inner content cross-fades + rises in. */
  .v3-hero { transition: height .52s cubic-bezier(.5,.05,.15,1); }
  @keyframes v3-body-in { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .v3-body { animation: v3-body-in .42s cubic-bezier(.22,.61,.36,1) both; }
  @keyframes v3-head-in { from { opacity: 0; } to { opacity: 1; } }
  .v3-herocontent { animation: v3-head-in .5s ease both; }

  /* launch splash — logo pops in; the whole overlay fades out on dismiss (inline opacity).
     animate the independent `scale` property (not transform) so it doesn't clobber the
     inline transform: translateX(-50%) that centres variant 5's overlapping emblem. */
  .v-splash { transition: opacity .4s ease; }
  @keyframes v-splash-pop { from { opacity: 0; scale: .9; } to { opacity: 1; scale: 1; } }
  .v-splash-logo { animation: v-splash-pop .55s cubic-bezier(.22,.61,.36,1) both; }

  /* animated kid-friendly hero scene (sun/clouds/balloons drift, twinkle, float) */
  @keyframes vf-a { 0%,100%{ translate: 0 0; } 50%{ translate: 8px -11px; } }
  @keyframes vf-b { 0%,100%{ translate: 0 0; } 50%{ translate: -9px -6px; } }
  @keyframes vf-c { 0%,100%{ translate: 0 0; } 33%{ translate: 6px 8px; } 66%{ translate: -6px -5px; } }
  @keyframes vf-glide { 0%{ translate: 0 0; } 50%{ translate: 28px 11px; } 100%{ translate: 0 0; } }
  @keyframes vf-twinkle { 0%,100%{ opacity: var(--o,.4); } 50%{ opacity: calc(var(--o,.4) * .35); } }
  @keyframes vf-spin { from{ rotate: 0deg; } to{ rotate: 360deg; } }
  @keyframes v-float { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-8px); } }
  /* scene extras — balloon sway (rotate) + lazy vertical bob, for a livelier hero */
  @keyframes vf-sway { 0%,100%{ rotate: -5deg; } 50%{ rotate: 5deg; } }
  @keyframes vf-bob  { 0%,100%{ translate: 0 0; } 50%{ translate: 0 -15px; } }

  /* ── motion pass (v0.1) ─────────────────────────────────────────────── */
  /* staggered list entrance — rows rise + fade in one after another */
  @keyframes v-stagger-in { from { opacity: 0; transform: translateY(11px); } to { opacity: 1; transform: translateY(0); } }
  .v-stagger > * { animation: v-stagger-in .42s cubic-bezier(.22,.61,.36,1) both; }
  .v-stagger > *:nth-child(1){animation-delay:.02s} .v-stagger > *:nth-child(2){animation-delay:.06s}
  .v-stagger > *:nth-child(3){animation-delay:.10s} .v-stagger > *:nth-child(4){animation-delay:.14s}
  .v-stagger > *:nth-child(5){animation-delay:.18s} .v-stagger > *:nth-child(6){animation-delay:.22s}
  .v-stagger > *:nth-child(7){animation-delay:.26s} .v-stagger > *:nth-child(8){animation-delay:.30s}
  .v-stagger > *:nth-child(9){animation-delay:.34s} .v-stagger > *:nth-child(n+10){animation-delay:.38s}
  /* PIN-dot fill + selection-check pop (overshoot) */
  @keyframes v-pop { 0%{ transform: scale(.4); } 60%{ transform: scale(1.22); } 100%{ transform: scale(1); } }
  .v-pop { animation: v-pop .34s cubic-bezier(.34,1.56,.64,1) both; }
  /* bouncing loader dots (splash) */
  @keyframes v-bounce { 0%,80%,100%{ transform: scale(.5); opacity: .45; } 40%{ transform: scale(1); opacity: 1; } }
  .v-bounce-dot { animation: v-bounce 1.1s ease-in-out infinite; }

  /* a11y — the in-screen controls use all:unset (no outline); restore a visible keyboard focus ring.
     :focus-visible keeps it keyboard-only (no ring on mouse/touch press). */
  .v-row:focus-visible, .v-key:focus-visible, .v-btn:focus-visible,
  .device-screen button:focus-visible, .device-screen a:focus-visible {
    outline: 2px solid var(--sd-colour-action-primary);
    outline-offset: 2px;
    border-radius: 12px;
  }
  /* on the teal hero, a white ring reads better than teal */
  .v3-hero button:focus-visible { outline-color: #fff; }

  /* segmented "tab toggle" (Stardust component 4181-13429) — device / layout switch in the rail.
     ONE container with a sliding indicator: the selected pill (teal border + surface-cyan fill)
     slides between options; labels sit on top and recolour. */
  .tab-toggle {
    position: relative; display: grid; gap: 0; width: 100%; box-sizing: border-box;
    background: var(--sd-colour-surface-grey); border: 1px solid var(--sd-colour-grey-400);
    border-radius: 14px; padding: 5px;
  }
  .tab-toggle__ind {
    position: absolute; top: 5px; bottom: 5px; left: 5px; border-radius: 9px;
    background: var(--sd-colour-surface-cyan); border: 1.5px solid var(--sd-colour-border-focus);
    transition: transform .24s cubic-bezier(.4, 0, .2, 1); pointer-events: none;
  }
  .tab-seg {
    all: unset; box-sizing: border-box; cursor: pointer; position: relative; z-index: 1;
    display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 9px 12px;
    font-size: 14px; font-weight: 600; color: var(--sd-colour-text-secondary); transition: color .2s;
  }
  .tab-seg svg { width: 16px; height: 16px; flex-shrink: 0; }
  .tab-seg--selected { color: var(--sd-colour-action-primary); }
  .tab-seg:focus-visible { outline: 2px solid var(--sd-colour-action-primary); outline-offset: 2px; border-radius: 9px; }

  @media (prefers-reduced-motion: reduce) {
    .vf, .v-planet, .v-shake, .v-skeleton, .v-rise, .v3-body, .v3-herocontent, .v-splash-logo,
    .v-stagger > *, .v-pop, .v-bounce-dot { animation: none !important; }
    .v3-hero, .v-splash, .tab-toggle__ind { transition: none !important; }
  }
</style>
</head>
<body>
  <div id="site-nav"></div>

  <div class="site-content">
    <div class="proto-stage">
      <div class="page-head">
        <h1>Playground Sign-in · Service to Educator<span style="display:inline-block;vertical-align:middle;margin-left:10px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sd-colour-feedback-warning-default);background:var(--sd-colour-feedback-warning-subtle);border-radius:999px;padding:3px 9px;">WIP</span></h1>
        <p>Forked from Prototype v0.3 — the service login uses the Immersive teal direction; signing in reveals the educator list on a white sheet sliding up from the bottom.</p>
      </div>

      <div id="scaler"><div id="app"></div></div>
    </div>
  </div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="helpers.jsx?v=22"></script>
<script type="text/babel" src="variants.jsx?v=22"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('app')).render(<window.VariantsApp />);

  // scale the whole stage to fit the viewport (skipped in bare capture mode — device stays 1:1)
  const scaler = document.getElementById('scaler');
  const app = document.getElementById('app');
  const stage = document.querySelector('.proto-stage');
  const isBare = new URLSearchParams(window.location.search).get('bare');
  if (isBare) document.body.classList.add('is-bare');
  function fit() {
    if (isBare) { scaler.style.transform = 'scale(1)'; return; }
    scaler.style.transform = 'scale(1)';
    const w = app.scrollWidth, h = app.scrollHeight;
    if (!w || !h) return;
    // available width = the content area right of the sidebar (proto-stage), minus its padding
    const availW = (stage ? stage.clientWidth : window.innerWidth) - 48;
    const s = Math.min(1, availW / w, (window.innerHeight - 130) / h);
    scaler.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit);
  // re-fit when the rendered stage changes size (e.g. toggling Phone ↔ iPad / orientation)
  if (window.ResizeObserver) new ResizeObserver(fit).observe(app);
  fit(); setTimeout(fit, 150); setTimeout(fit, 500);

  // Custom overlay scrollbar. Native bars are hidden (so content is edge-to-edge), so we draw a
  // thin thumb that floats over the active scroll container's right edge and fades out shortly
  // after scrolling stops. One capture-phase listener on #app handles every (re-rendered) inner
  // scroller. Geometry is computed in the device's own layout units, dividing rect deltas by the
  // current stage scale so the thumb tracks correctly even when the harness is scaled down.
  const curScale = () => { try { return new DOMMatrixReadOnly(getComputedStyle(scaler).transform).a || 1; } catch (e) { return 1; } };
  const indHide = new WeakMap();
  app.addEventListener('scroll', (e) => {
    const el = e.target;
    if (!el || el.nodeType !== 1 || !el.closest) return;
    const ds = el.closest('.device-screen');
    if (!ds) return;
    const range = el.scrollHeight - el.clientHeight;
    if (range <= 0) return;
    let ind = ds.querySelector(':scope > .vc-scrollbar');
    if (!ind) { ind = document.createElement('div'); ind.className = 'vc-scrollbar'; ds.appendChild(ind); }
    const s = curScale();
    const top = (el.getBoundingClientRect().top - ds.getBoundingClientRect().top) / s; // scroller top in ds layout units
    const visH = el.clientHeight;
    const thumbH = Math.max(24, visH * visH / el.scrollHeight);
    ind.style.height = thumbH + 'px';
    ind.style.top = (top + (el.scrollTop / range) * (visH - thumbH)) + 'px';
    ind.classList.add('is-visible');
    clearTimeout(indHide.get(ind));
    indHide.set(ind, setTimeout(() => ind.classList.remove('is-visible'), 700));
  }, true); // capture — scroll doesn't bubble
</script>

<!-- Stardust site sidebar (injects into #site-nav). Production links resolve under /stardust4/. -->
<script src="../../../assets/js/nav.js"></script>

<!-- "Anatomy" inspector — hover the phone to see box-model + Stardust token mapping (phone-only, skipped in ?bare=1) -->
<script src="inspect-goggles.js?v=2"></script>
</body>
</html>
